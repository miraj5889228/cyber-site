<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            /* ছবির ফাইলটির নাম যেন ঠিক এটাই হয় */
            background-image: url('1000273155.jpg');
            background-color: #000000; /* ছবি না পেলেও কালো ব্যাকগ্রাউন্ড দেখাবে */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #00FF00;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            padding-top: 50px;
            margin: 0;
            height: 100vh;
        }
        h1 {
            font-size: 40px;
            text-shadow: 0 0 10px #00FF00;
            color: #00FF00;
        }
        .box {
            border: 2px dashed #00FF00;
            display: inline-block;
            padding: 20px;
            margin-top: 30px;
            background-color: rgba(0, 0, 0, 0.8); /* বক্সটি কালো ও স্বচ্ছ হবে */
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            color: #00FF00;
        }
        .blink {
            animation: blinker 1s linear infinite;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>[ MIRAJ CYBER SECURITY SITE ]</h1>
    <p class="blink">⚠️ ACCESS RESTRICTED</p>

    <div class="box">
        <h3>📊 SERVER STATUS: LIVE</h3>
        <p>Target: Worldwide | Mode: Permanent</p>
        <p>Defenses: Activated | Monitoring...</p>
    </div>

    <br><br>
    <a href="https://www.youtube.com/" style="color: #00FF00;">
        📺 VISIT MY YOUTUBE CHANNEL
    </a>

</body>
</html>
